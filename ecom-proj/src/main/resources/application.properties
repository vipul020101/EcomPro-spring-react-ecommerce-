spring.application.name=ecom-proj

# Defaults to H2 for quick local runs. For Postgres (recommended), set DB_URL/DB_DRIVER and enable Flyway.
spring.datasource.url=${DB_URL:jdbc:h2:file:./data/ecomdb;AUTO_SERVER=TRUE}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.show-sql=${JPA_SHOW_SQL:true}
# H2/dev default: update. For Postgres+Flyway: set JPA_DDL_AUTO=validate
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.defer-datasource-initialization=true
spring.jpa.open-in-view=false

spring.sql.init.mode=never

spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2-console

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Flyway (enable for Postgres)
spring.flyway.enabled=${FLYWAY_ENABLED:false}

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# JWT auth
app.jwt.issuer=ecom-proj
# 32+ chars recommended for HS256
app.jwt.secret=${JWT_SECRET:change-me-to-a-long-random-secret-32chars-min}
app.jwt.ttl-seconds=86400

# Seed admin user (change for real deployments)
app.seed.admin.email=${SEED_ADMIN_EMAIL:admin@ecom.local}
app.seed.admin.password=${SEED_ADMIN_PASSWORD:admin12345}
app.seed.admin.name=${SEED_ADMIN_NAME:Admin}